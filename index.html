<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>らいとら</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{
font-family:sans-serif;
text-align:center;
background:#f5f5f5;
}

.box{
background:white;
padding:20px;
margin:20px;
border-radius:10px;
}

button{
padding:10px 20px;
font-size:16px;
}

#map{
height:400px;
margin:20px;
}

.arrow{
font-size:50px;
transition: transform 0.3s ease;
}
</style>

</head>

<body>

<h1>らいとら</h1>

<div id="map"></div>

<div class="box">
最寄り駅：<span id="nearest">未判定</span><br>
距離：<span id="distance">未取得</span><br>
方位：<span id="direction">未取得</span>
</div>

<div class="box">
乗車駅：
<select id="start"></select>
<br><br>
降車駅：
<select id="goal"></select>
<br><br>
<button onclick="showFare()">料金を表示</button>
</div>

<div class="box">
料金：<span id="fare">未表示</span>
</div>

<button onclick="startTracking()">現在地を取得</button>

<script>

// 地図
let map = L.map('map').setView([33.5600,133.5445],17);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'© OpenStreetMap'
}).addTo(map);

// 駅データ
const stations=[
{name:"東門",lat:33.5499,lon:133.5026},
{name:"大階段",lat:33.5506,lon:133.5018},
{name:"１－７Ｈ前",lat:33.5505,lon:133.5008},
{name:"給食搬入口",lat:33.5514,lon:133.5010},
{name:"調理室前",lat:33.5509,lon:133.5012},
{name:"ロータリー",lat:33.5509,lon:133.5019},
{name:"正門",lat:33.5510,lon:133.5021}
];

// 駅マーカー
stations.forEach(st=>{
L.marker([st.lat,st.lon]).addTo(map).bindPopup(st.name);
});

// 路線
let route=stations.map(s=>[s.lat,s.lon]);
L.polyline(route,{color:"blue",weight:5}).addTo(map);


// 距離（Haversine）
function getDistance(lat1,lon1,lat2,lon2){

const R=6371000;

const dLat=(lat2-lat1)*Math.PI/180;
const dLon=(lon2-lon1)*Math.PI/180;

const a=
Math.sin(dLat/2)**2+
Math.cos(lat1*Math.PI/180)*
Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)**2;

return 2*R*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// プルダウン
const startSelect=document.getElementById("start");
const goalSelect=document.getElementById("goal");

stations.forEach(st=>{
startSelect.add(new Option(st.name));
goalSelect.add(new Option(st.name));
});

// 現在地
let currentLat,currentLon,currentMarker;

// リアルタイムGPS
function startTracking(){

navigator.geolocation.watchPosition(

function(pos){

currentLat=pos.coords.latitude;
currentLon=pos.coords.longitude;

updateMap();
findNearest();

},

function(){
alert("位置情報が取得できません");
},

{
enableHighAccuracy:true,
timeout:10000,
maximumAge:0
}

);
}

// 地図更新
function updateMap(){

if(currentMarker){
map.removeLayer(currentMarker);
}

currentMarker=L.marker([currentLat,currentLon])
.addTo(map)
.bindPopup("現在地");

map.setView([currentLat,currentLon],17);
}

// 最寄り駅
function findNearest(){

let min=Infinity;
let nearest;

stations.forEach(st=>{
let d=getDistance(currentLat,currentLon,st.lat,st.lon);

if(d<min){
min=d;
nearest=st;
}
});

document.getElementById("nearest").innerText=nearest.name;
document.getElementById("distance").innerText=Math.round(min)+" m";

showDirection(nearest);
}

// 駅取得
function getStation(name){
return stations.find(s=>s.name===name);
}

// 料金
const fares={
"東門-大階段":10,"東門-１－７Ｈ前":20,"東門-給食搬入口":30,"東門-調理室前":40,"東門-ロータリー":50,"東門-正門":60,
"大階段-東門":10,"大階段-１－７Ｈ前":10,"大階段-給食搬入口":20,"大階段-調理室前":30,"大階段-ロータリー":40,"大階段-正門":50,
"１－７Ｈ前-東門":20,"１－７Ｈ前-大階段":10,"１－７Ｈ前-給食搬入口":10,"１－７Ｈ前-調理室前":20,"１－７Ｈ前-ロータリー":30,"１－７Ｈ前-正門":40,
"給食搬入口-東門":30,"給食搬入口-大階段":20,"給食搬入口-１－７Ｈ前":10,"給食搬入口-調理室前":10,"給食搬入口-ロータリー":20,"給食搬入口-正門":30,
"調理室前-東門":40,"調理室前-大階段":30,"調理室前-１－７Ｈ前":20,"調理室前-給食搬入口":10,"調理室前-ロータリー":10,"調理室前-正門":20,
"ロータリー-東門":50,"ロータリー-大階段":40,"ロータリー-１－７Ｈ前":30,"ロータリー-給食搬入口":20,"ロータリー-調理室前":10,"ロータリー-正門":10,
"正門-東門":60,"正門-大階段":50,"正門-１－７Ｈ前":40,"正門-給食搬入口":30,"正門-調理室前":20,"正門-ロータリー":10
};

function showFare(){

const key=startSelect.value+"-"+goalSelect.value;

document.getElementById("fare").innerText=
fares[key] ? fares[key]+"円" : "設定なし";
}

</script>

</body>
</html>
